services:
  tetris-assembly-dev:
    platform: linux/amd64
    image: tetris-assembly-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tetris-assembly-dev
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/root/.Xauthority
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
    devices:
      # Default: AMD/Intel iGPU support via DRI device passthrough
      - /dev/dri:/dev/dri:rw
      # Uncomment below for NVIDIA GPU support (requires nvidia-docker)
      # - /dev/nvidia0:/dev/nvidia0:rw
      # - /dev/nvidiactl:/dev/nvidiactl:rw
    volumes:
      - .:/workspaces/mirte_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Set XAUTHORITY on the host if your desktop uses a different location.
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro
